[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-optics"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Optical design plugin for Kerf — paraxial ray-transfer matrix model"
requires-python = ">=3.11"
dependencies = [
    "numpy",
]

[project.entry-points."kerf.plugins"]
optics = "kerf_optics.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_optics"]
