[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-v1"
version = "0.1.0"
description = "Kerf v1 plugin: JSON-RPC 2.0 dispatcher for kerf-sdk"
requires-python = ">=3.11"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
dependencies = [
    "fastapi>=0.111.0",
    "asyncpg>=0.29.0",
    "kerf-core>=0.1.0",
    "kerf-api>=0.1.0",
    "kerf-auth>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[project.entry-points."kerf.plugins"]
kerf-v1 = "kerf_v1.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_v1"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
