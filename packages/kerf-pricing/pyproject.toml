[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# SPDX-License-Identifier: LicenseRef-Kerf-Cloud
#
# kerf-pricing is a CLOUD-TIER (proprietary) plugin.  See LICENSE-CLOUD at
# the repo root for the proprietary licence that governs this package.
# The OSS bundle never imports this package — it is gated by
# ctx.cloud_enabled in plugin.py.

[project]
name = "kerf-pricing"
version = "0.1.0"
description = "Live LLM model pricing via LiteLLM (cloud-only)"
requires-python = ">=3.11"
license = { text = "LicenseRef-Kerf-Cloud" }
classifiers = ["License :: Other/Proprietary License"]
dependencies = [
    "fastapi>=0.111.0",
    "asyncpg>=0.29.0",
    "httpx>=0.27.0",
    "kerf-core>=0.1.0",
    "kerf-auth>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[project.entry-points."kerf.plugins"]
kerf-pricing = "kerf_pricing.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_pricing"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
