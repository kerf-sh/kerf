[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-landscape"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Landscape and site-design plugin for Kerf"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
full = ["numpy", "scipy"]

[project.entry-points."kerf.plugins"]
landscape = "kerf_landscape.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_landscape"]

[tool.pytest.ini_options]
testpaths = ["tests"]
