[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-piping"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "P&ID / piping plant design plugin for Kerf — ISA 5.1 symbols, isometric routing, DXF export"
requires-python = ">=3.11"
dependencies = [
    "numpy",
]

[project.optional-dependencies]
dxf = [
    "ezdxf>=1.1",
]

[project.entry-points."kerf.plugins"]
piping = "kerf_piping.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_piping"]

[tool.pytest.ini_options]
testpaths = ["tests"]
