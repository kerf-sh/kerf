[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-firmware"
version = "0.1.0"
description = "Firmware toolchain integration for Kerf: board catalogue + library registry client"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_firmware"]

[tool.pytest.ini_options]
testpaths = ["tests"]
