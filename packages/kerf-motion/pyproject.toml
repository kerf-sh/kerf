[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-motion"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Multibody dynamics, kinematics, and motion simulation plugin for Kerf"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "asyncpg",
]

[project.entry-points."kerf.plugins"]
motion = "kerf_motion.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_motion"]
