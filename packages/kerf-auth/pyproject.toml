[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-auth"
version = "0.1.0"
description = "Kerf auth plugin: JWT, sessions, OAuth, API tokens"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.111.0",
    "asyncpg>=0.29.0",
    "pyjwt>=2.8.0",
    "bcrypt>=4.1.0",
    "httpx>=0.27.0",
    "kerf-core>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[project.entry-points."kerf.plugins"]
kerf-auth = "kerf_auth.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_auth"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
