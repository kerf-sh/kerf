[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-dental"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Dental CAD plugin for Kerf — crown design, surgical guides, DICOM ingest"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
]

[project.optional-dependencies]
dicom = [
    "pydicom>=2.4",
]

[project.entry-points."kerf.plugins"]
dental = "kerf_dental.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_dental"]
