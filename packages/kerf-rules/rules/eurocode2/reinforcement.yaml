rules:
  # ── Eurocode 2 (EN 1992-1-1:2004) — Reinforced Concrete ──────────────────

  - id: EC2-9.2.1-1
    standard: EN 1992-1-1:2004
    clause: 9.2.1(1)
    description: Minimum clear spacing between bars ≥ max(bar_diameter, 20mm, 1.2×dg)
    domain: structural
    tags: [concrete, reinforcement, spacing]
    when:
      element_type: rc_beam
      has_properties:
        - clear_bar_spacing_mm
        - bar_diameter_mm
    then:
      check: ge
      expr: "clear_bar_spacing_mm"
      limit: 20
      severity: error
      message: "EC2 §9.2.1(1) — beam {id}: clear bar spacing {value:.1f} mm < minimum 20 mm"

  - id: EC2-9.2.1-2
    standard: EN 1992-1-1:2004
    clause: 9.2.1(2)
    description: Clear spacing ≥ bar diameter (horizontal)
    domain: structural
    tags: [concrete, reinforcement, spacing]
    when:
      element_type: rc_beam
      has_properties:
        - clear_bar_spacing_mm
        - bar_diameter_mm
    then:
      check: ge
      expr: "clear_bar_spacing_mm - bar_diameter_mm"
      limit: 0
      severity: error
      message: "EC2 §9.2.1(2) — beam {id}: clear spacing {clear_bar_spacing_mm:.1f} mm < bar diameter {bar_diameter_mm:.1f} mm"

  - id: EC2-9.2.1-3
    standard: EN 1992-1-1:2004
    clause: 9.2.1(3)
    description: Maximum bar spacing in beams ≤ 150 mm for high shear zones
    domain: structural
    tags: [concrete, reinforcement, max-spacing]
    when:
      element_type: rc_beam
      has_properties:
        - bar_spacing_mm
        - high_shear_zone
    then:
      check: le
      expr: "bar_spacing_mm"
      limit: 150
      severity: warning
      message: "EC2 §9.2.1(3) — beam {id}: bar spacing {value:.1f} mm > 150 mm in high shear zone"

  - id: EC2-9.2.2-1
    standard: EN 1992-1-1:2004
    clause: 9.2.2(1)
    description: Minimum shear link spacing sl ≤ 0.75d
    domain: structural
    tags: [concrete, shear, links]
    when:
      element_type: rc_beam
      has_properties:
        - shear_link_spacing_mm
        - effective_depth_mm
    then:
      check: le
      expr: "shear_link_spacing_mm / effective_depth_mm"
      limit: 0.75
      severity: error
      message: "EC2 §9.2.2(1) — beam {id}: sl/d = {value:.3f} > 0.75 (sl={shear_link_spacing_mm:.0f} mm)"

  - id: EC2-9.3.1-1
    standard: EN 1992-1-1:2004
    clause: 9.3.1.1(1)
    description: Secondary reinforcement ≥ 20% of principal reinforcement
    domain: structural
    tags: [concrete, slab, secondary-reinforcement]
    when:
      element_type: rc_slab
      has_properties:
        - secondary_steel_area_mm2
        - principal_steel_area_mm2
    then:
      check: ge
      expr: "secondary_steel_area_mm2 / principal_steel_area_mm2"
      limit: 0.20
      severity: warning
      message: "EC2 §9.3.1.1(1) — slab {id}: secondary/principal As ratio = {value:.3f} < 0.20"

  - id: EC2-7.3.1-1
    standard: EN 1992-1-1:2004
    clause: 7.3.1(5)
    description: Minimum As for crack control in beams (0.26 fctm/fyk × bt × d)
    domain: structural
    tags: [concrete, crack-control, minimum-steel]
    when:
      element_type: rc_beam
      has_properties:
        - provided_tension_steel_mm2
        - min_steel_crack_mm2
    then:
      check: ge
      expr: "provided_tension_steel_mm2 / min_steel_crack_mm2"
      limit: 1.0
      severity: error
      message: "EC2 §7.3.1(5) — beam {id}: As provided / As,min = {value:.3f} < 1.0"

  - id: EC2-9.5.2-1
    standard: EN 1992-1-1:2004
    clause: 9.5.2(1)
    description: Minimum column longitudinal reinforcement As ≥ 0.002 Ac
    domain: structural
    tags: [concrete, column, minimum-steel]
    when:
      element_type: rc_column
      has_properties:
        - longitudinal_steel_mm2
        - gross_area_mm2
    then:
      check: ge
      expr: "longitudinal_steel_mm2 / gross_area_mm2"
      limit: 0.002
      severity: error
      message: "EC2 §9.5.2(1) — column {id}: As/Ac = {value:.5f} < 0.002 minimum"

  - id: EC2-9.5.2-2
    standard: EN 1992-1-1:2004
    clause: 9.5.2(3)
    description: Maximum column longitudinal reinforcement As ≤ 0.04 Ac
    domain: structural
    tags: [concrete, column, maximum-steel]
    when:
      element_type: rc_column
      has_properties:
        - longitudinal_steel_mm2
        - gross_area_mm2
    then:
      check: le
      expr: "longitudinal_steel_mm2 / gross_area_mm2"
      limit: 0.04
      severity: error
      message: "EC2 §9.5.2(3) — column {id}: As/Ac = {value:.4f} > 0.04 maximum"

  - id: EC2-9.5.3-1
    standard: EN 1992-1-1:2004
    clause: 9.5.3(1)
    description: Maximum transverse link spacing in columns ≤ 12φ or 0.6b or 240 mm
    domain: structural
    tags: [concrete, column, links, spacing]
    when:
      element_type: rc_column
      has_properties:
        - link_spacing_mm
        - bar_diameter_mm
    then:
      check: le
      expr: "link_spacing_mm"
      limit: 240
      severity: error
      message: "EC2 §9.5.3(1) — column {id}: link spacing {value:.1f} mm > 240 mm absolute maximum"

  - id: EC2-3.1.2-1
    standard: EN 1992-1-1:2004
    clause: 3.1.2(2)
    description: Maximum concrete grade C90/105 for normal structures
    domain: structural
    tags: [concrete, material, grade]
    when:
      element_type: concrete_element
      has_properties:
        - fck_mpa
    then:
      check: le
      expr: "fck_mpa"
      limit: 90
      severity: warning
      message: "EC2 §3.1.2(2) — element {id}: fck = {value:.0f} MPa; high-strength concrete requires special provisions"
