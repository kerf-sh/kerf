[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-rules"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Knowledge-based engineering code-compliance rule engine for Kerf — AISC / Eurocode 2 / ASME B18 and more"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "pydantic",
    "pyyaml",
]

[project.entry-points."kerf.plugins"]
rules = "kerf_rules.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_rules"]
