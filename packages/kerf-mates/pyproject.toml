[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-mates"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Assembly-mates constraint solver plugin for Kerf"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "pydantic",
    "kerf-cad-core",
]

[project.optional-dependencies]
solvespace = [
    "python-solvespace",
]

[project.entry-points."kerf.plugins"]
mates = "kerf_mates.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_mates"]
