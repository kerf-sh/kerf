# McMaster-Carr metric machine screws — curated starter library.
#
# A small set of low-head and socket-head metric machine screws
# commonly used in maker / 3D-printing assemblies. Part numbers and
# URLs were verified against mcmaster.com at the time of authoring.
# Each Part carries the McMaster catalogue SKU as the distributor
# entry; pricing is left blank because McMaster doesn't expose a free
# API and we don't want to bake a stale snapshot in.
#
# All sizes are nominal metric — a person ordering should still
# double-check head height + thread pitch against their assembly.

